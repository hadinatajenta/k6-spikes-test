name: K6 Load Test (Advanced)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      
      vus_multiplier:
        description: 'VU multiplier (1 = default, 2 = double load)'
        required: false
        default: '1'
        type: string

  schedule:
    # Daily smoke test at 2 AM UTC
    - cron: '0 2 * * *'
    # Weekly stress test at 3 AM UTC (Mondays)
    - cron: '0 3 * * 1'

jobs:
  k6-load-test:
    runs-on: ubuntu-latest
    
    env:
      TEST_ENV: ${{ github.event.inputs.environment || 'staging' }}
      VUS_MULTIPLIER: ${{ github.event.inputs.vus_multiplier || '1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set test configuration
        id: config
        run: |
          if [[ "${{ github.event.schedule }}" == "0 3 * * 1" ]]; then
            echo "test_type=stress" >> $GITHUB_OUTPUT
            echo "Test type: STRESS (Weekly Monday)" >> $GITHUB_STEP_SUMMARY
          else
            echo "test_type=smoke" >> $GITHUB_OUTPUT
            echo "Test type: SMOKE (Daily)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build k6 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.k6
          push: false
          load: true
          tags: k6-load-test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run k6 test
        id: test
        run: |
          docker run \
            --rm \
            --env TEST_ENV="${{ env.TEST_ENV }}" \
            --env VUS_MULTIPLIER="${{ env.VUS_MULTIPLIER }}" \
            --name k6-test \
            k6-load-test:${{ github.sha }} \
            k6 run spike_test.js \
            --out json=results.json
        continue-on-error: true

      - name: Parse k6 results
        if: always()
        id: results
        run: |
          if [ -f results.json ]; then
            echo "## K6 Load Test Results 📊" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Environment:** ${{ env.TEST_ENV }}" >> $GITHUB_STEP_SUMMARY
            echo "**Test Type:** ${{ steps.config.outputs.test_type }}" >> $GITHUB_STEP_SUMMARY
            echo "**VU Multiplier:** ${{ env.VUS_MULTIPLIER }}" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ✅ Completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "## K6 Load Test Results 📊" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ❌ Failed to generate results" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: k6-results-${{ github.run_number }}
          path: results.json
          retention-days: 30

      - name: Comment on commit
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### K6 Load Test Completed ✅\n\n**Environment:** ${{ env.TEST_ENV }}\n**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })
        continue-on-error: true

      - name: Fail if test thresholds exceeded
        if: steps.test.outcome == 'failure'
        run: |
          echo "❌ K6 test failed - thresholds exceeded or errors occurred"
          exit 1
